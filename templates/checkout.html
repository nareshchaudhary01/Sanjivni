{% extends 'base.html' %}

{% block content %}

<div class="container py-5">

    <h2 class="mb-4 fw-bold">Checkout</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="row">

            <!-- Left Column: Shipping Form Fields (Exact 2nd Photo Jaisa) -->
            <div class="col-lg-7">
                <div class="card shadow-sm p-4 mb-4">
                    <h4 class="mb-3 fw-bold">Shipping Details</h4>
                    <hr>

                    <!-- Name -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Name:</label>
                        <input type="text" name="name" class="form-control" placeholder="Your Name" required>
                    </div>

                    <!-- Email -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Email:</label>
                        <input type="email" name="email" class="form-control" placeholder="Email Address" required>
                    </div>

                    <!-- Phone -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Phone:</label>
                        <input type="text" name="phone" class="form-control" placeholder="Phone Number" required>
                    </div>

                    <!-- Address -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Address:</label>
                        <textarea name="address" class="form-control" rows="3" placeholder="Full Address" required></textarea>
                    </div>
                </div>
            </div>

            <!-- Right Column: Order Summary & Payment -->
            <div class="col-lg-5">

                <div class="card shadow-sm mb-4">
                <div class="card-body">

                    <h4 class="fw-bold">Order Summary</h4>
                    <hr>

                    <!-- Cart items loop -->
                    {% for item in cart.items.all %}
                        <p class="d-flex justify-content-between mb-2">
                            <span>{{ item.product.name }} × {{ item.quantity }}</span>
                            <span class="fw-bold">₹{{ item.total_price }}</span>
                        </p>
                    {% endfor %}

                    <hr>

                    <!-- Total Price from Cart model -->
                    <h4 class="text-success d-flex justify-content-between fw-bold mb-4">
                        <span>Total :</span>
                        <span>₹{{ cart.get_total_price }}</span>
                    </h4>

                    <!-- Payment Method Options -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Select Payment Method <span class="text-danger">*</span></label>
                        
                        <div class="card p-3 border bg-light">
                            <!-- COD Option -->
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="radio" name="payment_method" id="cod" value="COD" required>
                                <label class="form-check-label fw-bold" for="cod">
                                    💵 Cash on Delivery (COD)
                                </label>
                            </div>

                            <hr class="my-2">

                            <!-- Online Payment Option -->
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="payment_method" id="online" value="ONLINE" required>
                                <label class="form-check-label fw-bold" for="online">
                                    💳 Pay Now (UPI, Cards, NetBanking)
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- Place Order Button -->
                    <button type="submit" class="btn btn-success btn-lg w-100 fw-bold mt-2">
                        Place Order
                    </button>

                </div>
            </div>
            </div>

        </div>

    </form>

</div>

{% endblock %}
