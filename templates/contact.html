{% extends "base.html" %}

{% block content %}

<section class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="text-center mb-5">
                <h1 class="fw-bold">Contact Us</h1>
                <p class="text-muted">
                    We'd love to hear from you. Send us a message.
                </p>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-body p-4">

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input
                                type="text"
                                name="name"
                                class="form-control"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input
                                type="email"
                                name="email"
                                class="form-control"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Subject</label>
                            <input
                                type="text"
                                name="subject"
                                class="form-control"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Message</label>
                            <textarea
                                name="message"
                                rows="5"
                                class="form-control"
                                required></textarea>
                        </div>

                        <button
                            type="submit"
                            class="btn btn-success w-100">
                            Send Message
                        </button>

                    </form>

                </div>
            </div>

        </div>

    </div>

</section>

{% endblock %}
