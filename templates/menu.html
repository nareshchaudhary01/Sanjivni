{% extends "base.html" %}

{% block content %}

<section class="container py-5">

    <div class="text-center mb-5">
        <h1 class="fw-bold">Our Menu</h1>
        <p class="text-muted">
            Explore our healthy Moringa products.
        </p>
    </div>
    <div class="row mb-4">
    <div class="col-md-6 mx-auto">

        <form method="GET">

            <div class="input-group">

                <input
                    type="text"
                    name="q"
                    value="{{ query }}"
                    class="form-control"
                    placeholder="Search products...">

                <button class="btn btn-success">
                    Search
                </button>

            </div>

        </form>

    </div>
</div>

    <div class="row g-4">

        {% for product in products %}

        <div class="col-md-4">

            <div class="card h-100 shadow-sm border-0">

                <img src="{{ product.image.url }}"
                     class="card-img-top"
                     alt="{{ product.name }}">

                <div class="card-body text-center">

                    <h4>{{ product.name }}</h4>

                    <p class="text-muted">
                        {{ product.description|truncatewords:15 }}
                    </p>

                    <h3 class="text-success">
                        ₹{{ product.price }}
                    </h3>

                    <a href="{% url 'product_detail' product.slug %}" class="btn btn-success">
                        View Product
                    </a>

                </div>

            </div>

        </div>

        {% empty %}

        <div class="col-12 text-center">
            <h4>No Products Available</h4>
        </div>

        {% endfor %}

    </div>

</section>

{% endblock %}
