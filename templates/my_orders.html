{% extends "base.html" %}

{% block content %}

<div class="container py-5">

    <h2 class="mb-4">
        My Orders
    </h2>

    {% if orders %}

    <table class="table table-bordered">

        <thead class="table-success">

            <tr>
                <th>Order ID</th>
                <th>Date</th>
                <th>Total</th>
            </tr>

        </thead>

        <tbody>

        {% for order in orders %}

            <tr>

                <td>#{{ order.id }}</td>

                <td>{{ order.created_at }}</td>

                <td>₹{{ order.total }}</td>

            </tr>

        {% endfor %}

        </tbody>

    </table>

    {% else %}

        <div class="alert alert-info">
            You have not placed any orders yet.
        </div>

    {% endif %}

</div>

{% endblock %}
